<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - eDOC</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo-section">
            <img src="logo.png" class="logo-img">
            <span class="logo-text">eDOC</span>
        </div>

        <div class="title">DOCTOR APPOINTMENT MANAGEMENT</div>
    </div>

    <!-- MAIN -->
    <div class="main" style="padding:30px; align-items:flex-start;">
        <div class="box" style="width:900px; max-width:100%;">
            <h2>Patient Appointments</h2>

            <div id="doctorAppointments">
                <p>Loading appointments...</p>
            </div>
        </div>
    </div>

    <script src="doctor.js"></script>

</body>
</html>
