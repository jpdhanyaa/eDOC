<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eDOC Appointment</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#0040a1",
                secondary: "#0056d2",
                surface: "#f8fafb",
                card: "#ffffff",
                muted: "#6b7280",
                borderc: "#d1d5db"
            },
            fontFamily: {
                headline: ["Manrope"],
                body: ["Inter"]
            }
        }
    }
}
</script>

<style>
.primary-gradient{
    background: linear-gradient(135deg,#0040a1 0%,#0056d2 100%);
}
</style>
</head>

<body class="bg-surface font-body min-h-screen">

<!-- HEADER -->
<header class="w-full bg-white shadow-sm border-b border-gray-200 px-8 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <img src="logo.png" class="w-10 h-10 rounded-lg">
        <span class="text-2xl font-headline font-extrabold text-primary">eDOC</span>
    </div>

    <h1 class="text-lg md:text-xl font-semibold text-gray-700 tracking-wide">
        TELECOMMUNICATION CONSULTATION PLATFORM
    </h1>
</header>

<!-- MAIN LAYOUT -->
<div class="min-h-[calc(100vh-80px)] flex flex-col lg:flex-row">

    <!-- SIDEBAR -->
    <aside class="lg:w-1/3 xl:w-1/4 bg-white border-r border-gray-200 p-6 space-y-6">

        <div class="bg-blue-50 rounded-2xl p-5 shadow-sm">
            <h2 class="text-xl font-bold text-primary mb-4">🔔 Notifications</h2>
            <div id="notifications" class="space-y-3 text-sm text-gray-600">
                No notifications yet.
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
            <h3 class="text-lg font-bold mb-4 text-gray-800">Cancellation</h3>

            <input type="text" id="cancelReason"
                placeholder="Enter reason"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-200 outline-none mb-4">

            <button onclick="cancelAppointment()"
                class="w-full primary-gradient text-white py-3 rounded-xl font-semibold">
                Cancel Appointment
            </button>
        </div>

    </aside>

    <!-- CONTENT -->
    <main class="flex-1 flex justify-center items-center p-6 md:p-12">

        <!-- PAGE 1 -->
        <div id="page1" class="w-full max-w-xl">
            <div class="bg-white rounded-3xl shadow-lg border border-gray-200 p-8">
                <h2 class="text-3xl font-headline font-bold mb-8 text-gray-800">
                    Appointment Details
                </h2>

                <div class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-600">Name</label>
                        <input type="text" id="name"
                            placeholder="Enter name"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-200 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-600">Date</label>
                        <input type="date" id="date"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-200 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-600">Session</label>
                        <select id="session"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-200 outline-none">
                            <option value="FN">FN</option>
                            <option value="AN">AN</option>
                        </select>
                    </div>

                    <button onclick="goToPage2()"
                        class="w-full primary-gradient text-white py-4 rounded-xl font-bold text-lg mt-4">
                        Next
                    </button>

                </div>
            </div>
        </div>

        <!-- PAGE 2 -->
        <div id="page2" class="hidden w-full max-w-xl">
            <div class="bg-white rounded-3xl shadow-lg border border-gray-200 p-8">
                <h2 class="text-3xl font-headline font-bold mb-8 text-gray-800">
                    Upload Reports
                </h2>

                <div class="space-y-6">

                    <input type="file" id="file"
                        class="w-full border border-gray-300 rounded-xl p-3">

                    <label class="flex items-center gap-3 text-gray-700">
                        <input type="checkbox" id="consultOnly"
                            class="w-5 h-5 text-primary rounded">
                        <span class="font-medium">Consultation Only</span>
                    </label>

                    <button onclick="bookAppointment()"
                        class="w-full primary-gradient text-white py-4 rounded-xl font-bold text-lg">
                        Book Appointment
                    </button>

                </div>
            </div>
        </div>

    </main>
</div>

<script src="script.js"></script>

</body>
</html>
